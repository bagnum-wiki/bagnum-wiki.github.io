<div class="w3-col l3 m6">
    <div class="w3-card player-card {{ include.color }}">
        <div class="w3-display-container">
            <img src="{{ include.player.image }}" alt="{{ include.player.name }}" style="width:100%">
            <span class="w3-display-topleft w3-black w3-padding" style="opacity:0.8">#{{ include.player.number }}</span>
        </div>
        <div class="w3-container w3-center w3-padding-16">
            <h4><b>{{ include.player.name }}</b></h4>
            <p class="w3-opacity w3-small">{{ include.player.position }}</p>
            <p class="w3-tiny"><i>{{ include.player.bio }}</i></p>
        </div>
    </div>
</div>
