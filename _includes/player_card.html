<div class="w3-col l3 m6">
    <div class="w3-card w3-white w3-margin-bottom" style="border-radius: 8px; overflow: hidden;">
        <div class="w3-display-container" style="height: 250px; background: #eee; overflow: hidden;">
            <img src="{{ include.player.image | default: '/assets/images/placeholder.png' }}" 
                 alt="{{ include.player.name }}" 
                 style="width:100%; height:100%; object-fit: cover;">
            <span class="w3-display-topleft w3-black w3-padding" style="opacity:0.8">#{{ include.player.number }}</span>
        </div>
        <div class="w3-container w3-center w3-padding-16">
            <h4 style="margin:0;"><b>{{ include.player.name }}</b></h4>
            <p class="w3-opacity w3-small" style="margin:5px 0;">{{ include.player.position }}</p>
            <p class="w3-tiny"><i>{{ include.player.bio }}</i></p>
        </div>
    </div>
</div>
